{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1 class="card-title" style="text-align: center;">🌸 Авторизация</h1>
    <form method="POST">
        <div class="form-group">
            <label>📱 Номер телефона</label>
            <input type="tel" name="phone" placeholder="+79991234567" required>
        </div>
        <div class="form-group">
            <label>🔐 СМС-код</label>
            <input type="text" name="sms_code" placeholder="Введите код из СМС" required>
        </div>
        <div style="text-align: center;">
            <button type="submit" class="btn">Войти ❤️</button>
        </div>
    </form>
    <p style="text-align: center; margin-top: 20px; color: var(--dark-pink);">
        Тестовые данные:<br>
        Телефон: +79991234567, Код: 124<br>
        Телефон: +79997654321, Код: 981
    </p>
</div>
{% endblock %}
